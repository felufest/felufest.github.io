<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FeluFest #1 - Master Seating Plan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;700;800&display=swap');
        body { font-family: 'Prompt', sans-serif; overscroll-behavior: none; }
        
        :root { --cell-size: 26px; --cell-gap: 4px; }

        .seat {
            width: var(--cell-size); height: var(--cell-size);
            border: 1px solid #cbd5e1;
            display: flex; align-items: center; justify-content: center;
            font-size: 8px; font-weight: 700; color: transparent;
            cursor: pointer; background: #ffffff;
        }
        .seat:hover { transform: scale(1.2); border-color: #64748b; z-index: 10; }
        .seat.blocked { background: #475569; border-color: #334155; }
        
        /* สไตล์โซนและบูธ (เอาความโค้งออก ตามคำขอ) */
        .facility-box { border: 2px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .text-vertical { writing-mode: vertical-rl; transform: rotate(180deg); }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden h-screen w-full">

    <main id="map-wrapper" class="w-full h-full overflow-auto p-10">
        <div id="stadium-map" class="bg-white p-12 border-2 border-slate-200 shadow-sm flex flex-col items-center min-w-max">
            
            <!-- ด้านบน: โถงและห้องต่างๆ -->
            <div class="w-full flex flex-col gap-4 mb-12">
                <div class="flex gap-4 h-28 w-full">
                    <div class="facility-box w-48 bg-slate-100 text-slate-500 text-sm">ELEVATOR 1-4</div>
                    <div class="facility-box flex-1 bg-pink-50 text-pink-600 text-2xl">LADIES' ROOM</div>
                    <div class="facility-box flex-1 bg-blue-50 text-blue-600 text-2xl">GENTS' ROOM</div>
                    <div class="facility-box flex-1 bg-teal-50 text-teal-600 text-2xl">ATHLETE'S ROOM</div>
                    <div class="facility-box flex-1 bg-amber-50 text-amber-700 text-2xl">CLOAKROOM</div>
                </div>
                <div class="w-full bg-slate-100 border-2 border-slate-200 h-20 flex items-center justify-between px-8 text-slate-400 font-bold tracking-widest uppercase">
                    <span class="bg-lime-200 px-4 py-2 text-xs text-lime-900 border border-lime-300">Merch Zone</span>
                    HALLWAY
                    <span class="bg-lime-200 px-4 py-2 text-xs text-lime-900 border border-lime-300">Staff Entrance</span>
                </div>
            </div>

            <!-- ผังหลัก -->
            <div class="flex gap-8">
                <!-- บูธซ้าย -->
                <div class="w-40 flex flex-col gap-4">
                    <div class="facility-box h-20 bg-lime-200 text-lime-900 text-xs">MAIN ENTRANCE</div>
                    <div class="facility-box flex-1 bg-purple-50 text-purple-600 text-sm text-vertical">FIRST AID UNIT</div>
                    <div class="facility-box flex-1 bg-purple-50 text-purple-600 text-lg text-vertical">SPONSOR BOOTH</div>
                    <div class="facility-box flex-1 bg-lime-200 text-lime-900 text-sm text-vertical">MARSHALLING AREA</div>
                </div>

                <!-- อัฒจันทร์และสนาม -->
                <div id="seating-core" class="flex flex-col gap-1 items-center">
                    <!-- จาวาสคริปต์จะวาดที่นั่งที่นี่ -->
                </div>

                <!-- บูธขวา -->
                <div class="w-40 flex flex-col gap-4">
                    <div class="facility-box flex-1 bg-purple-50 text-purple-600 text-lg text-vertical">PHOTO BOOTH</div>
                    <div class="facility-box flex-1 bg-purple-50 text-purple-600 text-lg text-vertical">SNACK BOOTH</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        // [โค้ดส่วนของ Firebase และการเรนเดอร์เดิมคงไว้ แต่ปรับให้ยิงข้อมูลเข้า div#seating-core]
        // การเรนเดอร์เดิมของคุณมีตรรกะการวาดเก้าอี้และโซนอยู่แล้ว นำมาวางที่นี่ได้เลยครับ
    </script>
</body>
</html>
