<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeluFest #1 - Activity Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด Font น่ารักๆ ดูอาร์ตๆ -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Mitr:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ตัวแปรสี CSS ที่จะถูกแก้ด้วย JavaScript (Theme Customizer) */
        :root {
            --bg-color: #0f172a; /* สีพื้นหลัง */
            --card-bg: #1e293b; /* สีการ์ด */
            --primary: #f59e0b; /* สีหลัก (ส้มเหลือง) */
            --primary-hover: #d97706;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-radius: 24px; /* ความมนของกรอบ */
        }

        body { 
            font-family: 'Mitr', sans-serif; 
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.5s ease;
        }

        h1, h2, h3, .font-heading { font-family: 'Fredoka One', cursive; }

        /* การ์ดสไตล์ไดนามิก (ขอบปรับแต่งได้) */
        .dynamic-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            border: 2px solid rgba(255,255,255,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        
        .dynamic-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px var(--primary);
            border-color: var(--primary);
        }

        /* ปุ่มต่างๆ */
        .btn-primary {
            background-color: var(--primary);
            color: #000;
            border-radius: calc(var(--border-radius) / 2);
            transition: all 0.2s;
        }
        .btn-primary:hover { background-color: var(--primary-hover); transform: scale(1.05); }

        /* แถบสีทีม */
        .team-red { background: linear-gradient(135deg, #ef4444, #991b1b); }
        .team-purple { background: linear-gradient(135deg, #a855f7, #6b21a8); }
        .team-blue { background: linear-gradient(135deg, #3b82f6, #1e40af); }
        .team-green { background: linear-gradient(135deg, #22c55e, #166534); }
        
        /* แอนิเมชันตอนโหลด */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .floating { animation: float 3s ease-in-out infinite; }
        
        /* สไตล์หน้าต่างตั้งค่าธีม */
        #theme-panel {
            backdrop-filter: blur(10px);
            background-color: rgba(15, 23, 42, 0.9);
            border-left: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col relative overflow-x-hidden">

    <!-- แบ็คกราวด์ตกแต่ง (ตกแต่งให้อาร์ตๆ) -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-yellow-500/20 rounded-full blur-[100px] pointer-events-none z-[-1]"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500/20 rounded-full blur-[100px] pointer-events-none z-[-1]"></div>

    <!-- ส่วนที่ 1: หน้าล็อกอิน (โชว์ตอนยังไม่เข้าสู่ระบบ) -->
    <div id="login-view" class="flex-1 flex flex-col items-center justify-center p-6 z-10 transition-opacity duration-500">

            <img id="main-logo-login" src="https://i.imgur.com/G53A5aJ.png" alt="FeluFest Logo" class="w-[500px] mx-auto mb-6 floating drop-shadow-xl">
            <h1 id="site-title-login" class="text-4xl mb-2 text-white drop-shadow-md">FeluFest #1</h1>
            <p id="site-slogan-login" class="text-sm text-gray-400 mb-8">You dream it, we fame it</p>

                <svg viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg"><g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)"><path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/><path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/><path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.809 -21.864 52.039 -21.864 51.239 C -21.864 50.439 -21.724 49.669 -21.484 48.949 L -21.484 45.859 L -25.464 45.859 C -26.284 47.479 -26.754 49.299 -26.754 51.239 C -26.754 53.179 -26.284 54.999 -25.464 56.619 L -21.484 53.529 Z"/><path fill="#EA4335" d="M -14.754 43.989 C -12.984 43.989 -11.404 44.599 -10.154 45.789 L -6.734 41.939 C -8.804 39.819 -11.514 38.739 -14.754 38.739 C -19.444 38.739 -23.494 41.439 -25.464 45.859 L -21.484 48.949 C -20.534 46.099 -17.884 43.989 -14.754 43.989 Z"/></g></svg>

    <!-- ส่วนที่ 2: Dashboard (โชว์ตอนล็อกอินแล้ว) -->

                    <div class="flex flex-wrap gap-4">

                        <!-- ตำแหน่งแสดงรูป QR Code -->

                    <button class="w-full py-2 bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold rounded-xl transition-all shadow-lg flex justify-center items-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6081 1.2498-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8745-.617-1.2498a.077.077 0 00-.0788-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.419-2.1569 2.419zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.419-2.1568 2.419z"/></svg>
                        เชื่อมต่อ Discord สีคุณ
                    </button>
                </div>
            </div>
        </div>

        <!-- Activity Hub (กระดานกิจกรรม) -->
        <h2 class="text-3xl font-heading text-white mb-6 pl-2 border-l-4 border-[var(--primary)]">Activity Hub</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="activity-cards-container">
            <!-- โค้ดสร้างการ์ดด้วย JS จะมาแทรกตรงนี้ -->
        </div>

    </div>

    <!-- ส่วนที่ 3: Theme Customizer Panel (ซ่อนไว้ โชว์เฉพาะ Owner) -->
    <div id="theme-panel" class="fixed top-0 right-0 w-80 h-full z-[100] transform translate-x-full transition-transform duration-300 p-6 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <h2 class="text-xl font-bold text-white">🎨 ปรับแต่งธีมเว็บ</h2>
            <button id="close-theme-btn" class="text-slate-400 hover:text-white">✕</button>
        </div>

        <div class="flex flex-col gap-5">
            <div>
                <label class="block text-sm text-slate-300 mb-2">ลิงก์โลโก้ (Image URL)</label>
                <input type="text" id="setting-logo" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white" placeholder="https://...">
            </div>
            <div>
                <label class="block text-sm text-slate-300 mb-2">ชื่อเว็บไซต์ (Title)</label>
                <input type="text" id="setting-title" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white" placeholder="FeluFest #1">
            </div>
            <div>
                <label class="block text-sm text-slate-300 mb-2">สโลแกน (Slogan)</label>
                <input type="text" id="setting-slogan" class="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-slate-300 mb-2">สีหลัก (Primary)</label>
                    <input type="color" id="setting-color-primary" class="w-full h-10 bg-slate-800 border border-slate-600 rounded cursor-pointer">
                </div>
                <div>
                    <label class="block text-sm text-slate-300 mb-2">สีการ์ด (Card BG)</label>
                    <input type="color" id="setting-color-card" class="w-full h-10 bg-slate-800 border border-slate-600 rounded cursor-pointer">
                </div>
            </div>
            <div>
                <label class="block text-sm text-slate-300 mb-2">สีพื้นหลังเว็บ (Background)</label>
                <input type="color" id="setting-color-bg" class="w-full h-10 bg-slate-800 border border-slate-600 rounded cursor-pointer">
            </div>
            <div>
                <label class="block text-sm text-slate-300 mb-2 flex justify-between">
                    ความมนของกรอบ <span id="radius-val">24px</span>
                </label>
                <input type="range" id="setting-radius" min="0" max="40" value="24" class="w-full accent-[var(--primary)]">
            </div>

            <button id="btn-save-theme" class="btn-primary w-full py-3 mt-4 font-bold">บันทึกธีมลงฐานข้อมูล</button>
            <p class="text-xs text-slate-500 text-center">ทุกคนที่เข้าเว็บจะเห็นหน้าตาแบบนี้ทันที</p>
        </div>
    </div>
<!-- โหลดไลบรารีสร้าง QR Code ฟรี -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- ส่วนที่ 4: JavaScript + Firebase Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🔥 ใส่ Config ของคุณตรงนี้ 🔥
        const firebaseConfig = {
            apiKey: "AIzaSyB1_nTNwucSl37tTitbxTP18bSCK5iWlOI",
            authDomain: "felufest-family.firebaseapp.com",
            projectId: "felufest-family",
            storageBucket: "felufest-family.firebasestorage.app",
            messagingSenderId: "524842246260",
            appId: "1:524842246260:web:d46534c7dcc27ccb757121",
            measurementId: "G-447NGTJ7J2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ระบุ Email ที่จะได้สิทธิ์ Admin (เปิดหน้าแก้ธีมได้)
        const ADMIN_EMAILS = ['felunadreamplace.official@gmail.com']; 

        // DOM Elements
        const loginView = document.getElementById('login-view');
        const dashboardView = document.getElementById('dashboard-view');
        const themePanel = document.getElementById('theme-panel');
        const btnThemeSettings = document.getElementById('btn-theme-settings');
        
        let currentUserData = null; // เก็บข้อมูล user จาก DB
        let qrcodeInstance = null; // เก็บตัวแปล QR Code

        // --- 1. ระบบจัดการธีม (Theme Engine) ---
        function applyTheme(themeData) {
            const root = document.documentElement;
            if(themeData.primary) root.style.setProperty('--primary', themeData.primary);
            if(themeData.cardBg) root.style.setProperty('--card-bg', themeData.cardBg);
            if(themeData.bgColor) root.style.setProperty('--bg-color', themeData.bgColor);
            if(themeData.radius) root.style.setProperty('--border-radius', themeData.radius + 'px');

            if(themeData.logoUrl) {
                document.getElementById('main-logo-login').src = themeData.logoUrl;
                document.getElementById('main-logo-dash').src = themeData.logoUrl;
            }
            if(themeData.title) {
                document.getElementById('site-title-login').innerText = themeData.title;
                document.getElementById('site-title-dash').innerText = themeData.title;
                document.title = `${themeData.title} - Activity Hub`;
            }
            if(themeData.slogan) {
                document.getElementById('site-slogan-login').innerText = themeData.slogan;
            }
        }

        // ดึง Theme จาก Firestore ทันทีที่โหลดเว็บ (ไม่ต้องรอล็อกอิน)
        const themeDocRef = doc(db, 'site_settings', 'theme');
        onSnapshot(themeDocRef, (docSnap) => {
            if (docSnap.exists()) {
                const themeData = docSnap.data();
                applyTheme(themeData);
                
                // อัปเดตค่าในฟอร์ม Admin เผื่อเค้าเปิดเข้ามาแก้
                document.getElementById('setting-logo').value = themeData.logoUrl || '';
                document.getElementById('setting-title').value = themeData.title || '';
                document.getElementById('setting-slogan').value = themeData.slogan || '';
                document.getElementById('setting-color-primary').value = themeData.primary || '#f59e0b';
                document.getElementById('setting-color-card').value = themeData.cardBg || '#1e293b';
                document.getElementById('setting-color-bg').value = themeData.bgColor || '#0f172a';
                document.getElementById('setting-radius').value = themeData.radius || 24;
                document.getElementById('radius-val').innerText = (themeData.radius || 24) + 'px';
            } else {
                // ถ้ายังไม่มี Theme ใน DB ให้เซฟค่า Default ลงไป
                setDoc(themeDocRef, {
                    logoUrl: 'https://i.imgur.com/G53A5aJ.png',
                    title: 'FeluFest #1',
                    slogan: 'You dream it, we fame it',
                    primary: '#f59e0b',
                    cardBg: '#1e293b',
                    bgColor: '#0f172a',
                    radius: 24
                });
            }
        });

        // --- 2. ระบบ Role & Auth ---
        document.getElementById('btn-login-google').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Login failed:", error);
                alert("ล็อกอินล้มเหลว กรุณาลองใหม่");
            }
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // เปลี่ยนหน้าจอ
                loginView.classList.add('hidden');
                loginView.classList.remove('flex');
                dashboardView.classList.remove('hidden');
                dashboardView.classList.add('flex');

                // โชว์รูปและชื่อ Google
                document.getElementById('user-avatar').src = user.photoURL;
                document.getElementById('user-display-name').innerText = user.displayName;

                // เช็คว่าใช่ Admin ไหม
                if (ADMIN_EMAILS.includes(user.email)) {
                    btnThemeSettings.classList.remove('hidden'); // เปิดปุ่มเฟือง
                    document.getElementById('user-role-badge').innerText = '🔥 OWNER';
                    document.getElementById('user-role-badge').classList.replace('bg-slate-700', 'bg-red-600');
                } else {
                    document.getElementById('user-role-badge').innerText = 'USER';
                }

                // ดึงข้อมูล/สร้าง User ใน Firestore
                const userRef = doc(db, 'users', user.uid);
                const userSnap = await getDoc(userRef);

                if (!userSnap.exists()) {
                    // เพิ่งล็อกอินครั้งแรก
                    currentUserData = {
                        uid: user.uid,
                        name: user.displayName,
                        email: user.email,
                        role: 'ผู้เข้าชม', // Default role
                        ticket_status: 'none',
                        team_color: 'none'
                    };
                    await setDoc(userRef, currentUserData);
                } else {
                    currentUserData = userSnap.data();
                }

                updateDashboardUI(currentUserData);
                renderActivities(currentUserData);

            } else {
                // ยังไม่ล็อกอิน
                loginView.classList.remove('hidden');
                loginView.classList.add('flex');
                dashboardView.classList.add('hidden');
                dashboardView.classList.remove('flex');
            }
        });

        // --- 3. อัปเดต UI หน้า Dashboard ตามข้อมูล User ---
        function updateDashboardUI(userData) {
            // อัปเดตสถานะตั๋ว
            const ticketEl = document.getElementById('ticket-status');
            const buySection = document.getElementById('buy-ticket-section');
            const qrSection = document.getElementById('qr-section');
            
            if (userData.ticket_status === 'none') {
                ticketEl.innerText = "ยังไม่มีตั๋ว";
                ticketEl.classList.add('text-red-400');
                buySection.classList.remove('hidden');
                qrSection.classList.add('hidden');
            } else {
                ticketEl.innerText = userData.ticket_status; // เช่น "Pre-sale (อัปเกรด)"
                ticketEl.classList.remove('text-red-400');
                ticketEl.classList.add('text-green-400');
                buySection.classList.add('hidden');
                qrSection.classList.remove('hidden');
                qrSection.classList.add('flex');

                // สร้าง QR Code ถ้ายังไม่เคยสร้าง
                if (!qrcodeInstance) {
                    qrcodeInstance = new QRCode(document.getElementById("qrcode-container"), {
                        text: userData.uid, // ฝัง UID ลงใน QR เพื่อให้สตาฟฟ์สแกนหน้างาน
                        width: 112,
                        height: 112,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                }
            }

            // อัปเดตแถบสีทีม
            const teamEl = document.getElementById('team-status');
            const colorBar = document.getElementById('team-color-bar');
            
            if (userData.team_color !== 'none') {
                teamEl.innerText = userData.team_color;
                
                // แมปชื่อสีกับคลาส CSS
                const colorMap = {
                    'แดง': 'team-red',
                    'ม่วง': 'team-purple',
                    'น้ำเงิน': 'team-blue',
                    'เขียว': 'team-green'
                };
                
                const cssClass = colorMap[userData.team_color];
                if(cssClass) {
                    colorBar.className = `absolute top-0 left-0 w-2 h-full ${cssClass}`;
                    teamEl.style.color = 'white';
                }
            }
        }

        // --- 4. Mock Data สร้างการ์ดกิจกรรม ---
        // ในอนาคตคุณสามารถดึงข้อมูลชุดนี้จาก Firestore ได้ แต่วันนี้เราทำ Mock ขึ้นมาให้เห็นภาพก่อน
        const mockActivities = [
            { id: 1, title: "สมัครแข่งขัน E-Sports (Valorant)", type: "Esports", forColor: "all", deadline: "2026-09-01T23:59:59" },
            { id: 2, title: "นัดซ้อมเชียร์ลีดเดอร์ (สีแดง)", type: "Cheer", forColor: "แดง", deadline: "2026-10-15T00:00:00" },
            { id: 3, title: "สมัครนักกีฬาวอลเลย์บอล (สีน้ำเงิน)", type: "Sports", forColor: "น้ำเงิน", deadline: "2026-11-01T00:00:00" },
            { id: 4, title: "Boardgame Night", type: "Casual", forColor: "all", deadline: "2026-08-20T20:00:00" }
        ];

        function renderActivities(userData) {
            const container = document.getElementById('activity-cards-container');
            container.innerHTML = ''; // ล้างของเก่า

            const userColor = userData.team_color;

            mockActivities.forEach(act => {
                // กรองกิจกรรม: ให้เห็นแค่ "all" กับ "สีตัวเอง"
                if (act.forColor !== 'all' && act.forColor !== userColor && userColor !== 'none') {
                    return; // ข้าม (ไม่โชว์)
                }

                // คำนวณ Countdown (แบบง่ายๆ โชว์แค่ วัน)
                const target = new Date(act.deadline).getTime();
                const now = new Date().getTime();
                const diff = target - now;
                
                let timeStatus = "";
                let isClosed = false;

                if (diff < 0) {
                    timeStatus = "ปิดรับสมัครแล้ว";
                    isClosed = true;
                } else {
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    timeStatus = `เหลือเวลา ${days} วัน`;
                }

                // สร้าง HTML การ์ด
                const cardHtml = `
                    <div class="dynamic-card p-6 flex flex-col justify-between h-full">
                        <div>
                            <span class="px-2 py-1 rounded bg-slate-700/50 text-[10px] uppercase font-bold text-slate-400 border border-slate-600 mb-3 inline-block">${act.type}</span>
                            <h3 class="font-bold text-lg text-white mb-2 leading-tight">${act.title}</h3>
                            <p class="text-sm ${isClosed ? 'text-red-400' : 'text-yellow-500'} font-bold flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                                ${timeStatus}
                            </p>
                        </div>
                        <button class="mt-6 w-full py-2 rounded-lg font-bold transition-all ${isClosed ? 'bg-slate-700 text-slate-500 cursor-not-allowed' : 'btn-primary shadow-lg shadow-[var(--primary)]/20'}" ${isClosed ? 'disabled' : ''}>
                            ${isClosed ? 'หมดเวลา' : 'ดูรายละเอียด & สมัคร'}
                        </button>
                    </div>
                `;
                container.innerHTML += cardHtml;
            });
        }

        // --- 5. ลอจิก Panel ตั้งค่าธีม ---
        btnThemeSettings.addEventListener('click', () => {
            themePanel.classList.remove('translate-x-full');
        });

        document.getElementById('close-theme-btn').addEventListener('click', () => {
            themePanel.classList.add('translate-x-full');
        });

        // อัปเดตเลข Radius แบบ Realtime เวลาเลื่อนหลอด
        document.getElementById('setting-radius').addEventListener('input', (e) => {
            document.getElementById('radius-val').innerText = e.target.value + 'px';
        });

        // บันทึกธีมลง DB
        document.getElementById('btn-save-theme').addEventListener('click', async () => {
            const btn = document.getElementById('btn-save-theme');
            btn.innerText = "กำลังบันทึก...";
            
            const newTheme = {
                logoUrl: document.getElementById('setting-logo').value,
                title: document.getElementById('setting-title').value,
                slogan: document.getElementById('setting-slogan').value,
                primary: document.getElementById('setting-color-primary').value,
                cardBg: document.getElementById('setting-color-card').value,
                bgColor: document.getElementById('setting-color-bg').value,
                radius: document.getElementById('setting-radius').value
            };

            try {
                await setDoc(themeDocRef, newTheme);
                alert('อัปเดตธีมเว็บสำเร็จ! ผู้ใช้งานทุกคนจะเห็นการเปลี่ยนแปลงนี้');
            } catch (error) {
                console.error(error);
                alert('เกิดข้อผิดพลาดในการเซฟ');
            } finally {
                btn.innerText = "บันทึกธีมลงฐานข้อมูล";
                themePanel.classList.add('translate-x-full'); // ซ่อนพาเนล
            }
        });
    </script>
</body>
</html>
