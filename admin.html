<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeluFest #1 - Admin Seating</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --cell-size: 28px; --cell-gap: 5px; }
        .seat { width: var(--cell-size); height: var(--cell-size); border-radius: 4px; cursor: pointer; border: 1px solid #cbd5e1; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: transparent; background: #f8fafc; transition: 0.15s; }
        .seat:hover { transform: scale(1.15); box-shadow: 0 4px 6px rgba(0,0,0,0.2); color: #334155; z-index: 10; }
        
        /* บันไดแบบริ้วตรง */
        .stair { width: var(--cell-size); height: var(--cell-size); background: #e2e8f0; display: flex; flex-direction: column; justify-content: space-evenly; align-items: center; }
        .stair-line { width: 60%; height: 2px; background: #cbd5e1; }
        
        .stage-zone { background: #1e293b; color: white; display: flex; align-items: center; justify-content: center; width: calc((var(--cell-size) * 12) + (var(--cell-gap) * 11)); height: 100%; border-radius: 8px; font-weight: 800; }
        
        /* สถานะ */
        .seat.available { background: white; }
        .seat.blocked { background: #64748b; cursor: not-allowed; }
        .seat.red { background: #ef4444; color: white; }
        .seat.purple { background: #a855f7; color: white; }
        .seat.blue { background: #3b82f6; color: white; }
        .seat.green { background: #22c55e; color: white; }
        .seat.guest { background: #f59e0b; color: white; border-radius: 50%; }
        .seat.cheer { background: #ec4899; color: white; }

        /* Zoom container */
        #map-container { transform-origin: top center; transform: scale(0.6); }
    </style>
</head>
<body class="bg-slate-100 h-screen overflow-hidden flex">

    <main class="flex-1 h-full overflow-auto p-4 md:p-8 cursor-grab active:cursor-grabbing">
        <div id="map-container" class="flex flex-col items-center">
            <div id="stadium-map" class="bg-white p-12 rounded-3xl shadow-xl border border-slate-200">
                </div>
        </div>
    </main>

    <aside id="sidebar" class="w-[380px] bg-white border-l shadow-2xl z-[200] transform translate-x-full transition-transform fixed right-0 h-full">
        <div class="p-6 border-b bg-slate-50 flex justify-between">
            <h2 class="font-bold text-xl">จัดการที่นั่ง</h2>
            <button onclick="toggleSidebar(false)" class="text-xl font-bold px-3 hover:text-red-500">✕</button>
        </div>
        <div class="p-6">
            <div id="seat-controls" class="hidden flex-col gap-4">
                <div class="bg-slate-100 p-4 rounded-xl text-center"><span id="selected-seat-id" class="text-3xl font-black text-indigo-600">-</span></div>
                <select id="seat-status" class="w-full border p-3 rounded-lg font-bold">
                    <option value="available">ว่าง</option><option value="blocked">บล็อก</option>
                    <option value="red">สีแดง</option><option value="purple">สีม่วง</option>
                    <option value="blue">สีน้ำเงิน</option><option value="green">สีเขียว</option>
                    <option value="guest">แขกรับเชิญ</option><option value="cheer">เชียร์ลีดเดอร์</option>
                </select>
                <input type="text" id="assigned-user" placeholder="ชื่อผู้ใช้งาน..." class="border p-3 rounded-lg">
                <button id="save-seat-btn" class="bg-indigo-600 text-white py-3 rounded-lg font-bold">บันทึกข้อมูล</button>
            </div>
        </div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { /* ใส่ Config ของคุณที่นี่ */ };
        const db = getFirestore(initializeApp(firebaseConfig));
        const mapContainer = document.getElementById('stadium-map');

        // ฟังก์ชันวาดโซนพร้อมชื่อ
        function renderStadiumSide(layoutArray, zoneNamesArray, isTopSide) {
            layoutArray.forEach((rowStr, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-4 justify-center mb-2';
                
                const zones = rowStr.split('|');
                zones.forEach((zoneStr, zIdx) => {
                    const zoneContainer = document.createElement('div');
                    zoneContainer.className = 'flex flex-col items-center gap-1';
                    
                    // ป้ายชื่อโซน
                    if(index === 0) {
                        const label = document.createElement('div');
                        label.className = 'font-black text-slate-400 text-xs mb-2';
                        label.innerText = `ZONE ${zoneNamesArray[zIdx]}`;
                        zoneContainer.appendChild(label);
                    }

                    const seatRow = document.createElement('div');
                    seatRow.className = 'flex gap-[5px]';
                    
                    for (let char of zoneStr) {
                        if (char === '-') {
                            const stair = document.createElement('div');
                            stair.className = 'stair';
                            stair.innerHTML = '<div class="stair-line"></div><div class="stair-line"></div>';
                            seatRow.appendChild(stair);
                        } else if (char === '*') {
                            const seat = document.createElement('div');
                            seat.className = 'seat available';
                            seat.onclick = () => selectSeat(seat.id);
                            seat.id = `${zoneNamesArray[zIdx]}-${index}-${Math.random()}`; // ID จะถูกกำหนดจริงตอนวาด
                            seatRow.appendChild(seat);
                        }
                    }
                    zoneContainer.appendChild(seatRow);
                    rowDiv.appendChild(zoneContainer);
                });
                mapContainer.appendChild(rowDiv);
            });
        }

        // Logic อื่นๆ คงเดิม แต่เปลี่ยนส่วน Save เป็น:
        document.getElementById('save-seat-btn').addEventListener('click', async () => {
            const seatId = document.getElementById('selected-seat-id').innerText;
            const status = document.getElementById('seat-status').value;
            
            // Optimistic Update: เปลี่ยนสีบนหน้าจอทันที ไม่ต้องรอ Database
            document.getElementById(seatId).className = `seat ${status}`;
            
            // บันทึกหลังบ้าน
            setDoc(doc(db, "seats", seatId), { status: status });
        });

        window.toggleSidebar = (show) => document.getElementById('sidebar').style.transform = show ? 'translateX(0)' : 'translateX(100%)';
        // ... (โค้ด render ส่วนที่เหลือ)
    </script>
</body>
</html>
