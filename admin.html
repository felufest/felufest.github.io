<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeluFest #1 - Seating Map Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Prompt:wght@400;600;700&display=swap');

        /* ตั้งค่าเริ่มต้นให้สวยงาม */
        body { font-family: 'Prompt', 'Inter', sans-serif; }
        
        /* Custom Scrollbar ให้ดูโมเดิร์น */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        :root {
            --cell-size: 26px; /* ปรับขนาดให้คลิกง่ายขึ้น */
            --cell-gap: 4px;
        }

        .seat-container {
            display: flex;
            gap: var(--cell-gap);
            position: relative;
        }

        /* สไตล์เก้าอี้ */
        .seat {
            width: var(--cell-size);
            height: var(--cell-size);
            border-radius: 6px 6px 2px 2px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid #cbd5e1;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: transparent;
            box-sizing: border-box;
            background-color: #f8fafc;
            box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
        }
        .seat:hover {
            transform: scale(1.25) translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
            color: #1e293b;
            z-index: 50;
            border-color: #94a3b8;
        }
        
        /* สไตล์ทางเดิน */
        .stair { 
            width: var(--cell-size); 
            height: var(--cell-size); 
            background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,0.04) 4px, rgba(0,0,0,0.04) 8px); 
            border: 1px dashed #cbd5e1;
            box-sizing: border-box;
            border-radius: 4px;
        }
        
        /* สไตล์โซนเวที */
        .stage-zone {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            color: #f8fafc;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            width: calc((var(--cell-size) * 12) + (var(--cell-gap) * 11)); 
            height: 100%;
            border-left: 2px solid #334155;
            border-right: 2px solid #334155;
            box-shadow: inset 0 10px 20px rgba(0,0,0,0.5);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .stage-row-first { border-radius: 12px 12px 0 0; border-top: 2px solid #334155; }
        .stage-row-last { border-radius: 0 0 12px 12px; border-bottom: 2px solid #334155; }

        /* สถานะต่างๆ ของเก้าอี้ */
        .seat.available { background-color: #f8fafc; }
        .seat.blocked { background-color: #475569; border-color: #334155; cursor: not-allowed; box-shadow: none; opacity: 0.8; }
        .seat.blocked:hover { color: white; transform: none; }
        
        /* สีทีมและบทบาท */
        .seat.red { background-color: #ef4444; border-color: #b91c1c; color: white; box-shadow: inset 0 -3px 0 #991b1b;}
        .seat.purple { background-color: #a855f7; border-color: #7e22ce; color: white; box-shadow: inset 0 -3px 0 #6b21a8;}
        .seat.blue { background-color: #3b82f6; border-color: #1d4ed8; color: white; box-shadow: inset 0 -3px 0 #1e40af;}
        .seat.green { background-color: #22c55e; border-color: #15803d; color: white; box-shadow: inset 0 -3px 0 #166534;}
        .seat.guest { background-color: #f59e0b; border-color: #b45309; color: white; border-radius: 50%; box-shadow: inset 0 -3px 0 #92400e; }
        .seat.cheer { background-color: #ec4899; border-color: #be185d; color: white; box-shadow: inset 0 -3px 0 #9d174d; }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden text-slate-800">

    <main class="flex-1 h-full overflow-auto p-4 md:p-8 relative">
        
        <div class="min-w-max bg-white p-10 rounded-2xl shadow-sm border border-slate-200">
            
            <div class="text-center mb-8">
                <h1 class="text-4xl font-black text-slate-900 tracking-tight mb-2">FeluFest #1</h1>
                <p class="text-slate-500 font-medium">Interactive Seating Map Dashboard</p>
            </div>
            
            <div class="mb-10 flex flex-wrap justify-center gap-3 bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs font-semibold">
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-slate-100 border mr-2 rounded-sm"></div> ว่าง</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-slate-600 mr-2 rounded-sm"></div> บล็อก</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-red-500 mr-2 rounded-sm"></div> แดง</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-purple-500 mr-2 rounded-sm"></div> ม่วง</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-blue-500 mr-2 rounded-sm"></div> น้ำเงิน</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-green-500 mr-2 rounded-sm"></div> เขียว</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-amber-500 rounded-full mr-2"></div> แขกรับเชิญ</span>
                <span class="flex items-center bg-white px-3 py-1.5 rounded-md shadow-sm border"><div class="w-3 h-3 bg-pink-500 mr-2 rounded-sm"></div> เชียร์ลีดเดอร์</span>
            </div>

            <div id="stadium-map" class="flex flex-col gap-1.5 items-center bg-slate-100 p-10 rounded-[2rem] border-2 border-slate-200">
                </div>
        </div>
    </main>

    <aside class="w-[380px] bg-white border-l border-slate-200 shadow-2xl flex-shrink-0 flex flex-col h-full z-20">
        
        <div class="p-6 border-b border-slate-100 bg-slate-50">
            <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                จัดการที่นั่ง
            </h2>
        </div>

        <div class="p-6 flex-1 overflow-y-auto">
            <div id="seat-info" class="mb-8">
                <p class="text-slate-500 text-sm mb-3 font-medium">1. รหัสที่นั่งที่เลือก</p>
                <div class="bg-indigo-50 p-6 rounded-xl text-center border border-indigo-100 shadow-sm transition-all">
                    <span id="selected-seat-id" class="text-4xl font-black text-indigo-700 tracking-wider">-</span>
                </div>
            </div>

            <div id="seat-controls" class="hidden flex-col gap-5">
                <div>
                    <label class="text-sm font-bold text-slate-700 block mb-2">2. สถานะ / สีทีม:</label>
                    <select id="seat-status" class="w-full border border-slate-300 p-3 rounded-xl bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all cursor-pointer font-medium text-slate-700 shadow-sm">
                        <option value="available">⚪ ว่าง (Available)</option>
                        <option value="blocked">⚫ บล็อก / สตาฟฟ์ (Blocked)</option>
                        <optgroup label="ผู้ชมทั่วไป">
                            <option value="red">🔴 ทีมสีแดง</option>
                            <option value="purple">🟣 ทีมสีม่วง</option>
                            <option value="blue">🔵 ทีมสีน้ำเงิน</option>
                            <option value="green">🟢 ทีมสีเขียว</option>
                        </optgroup>
                        <optgroup label="บุคคลพิเศษ">
                            <option value="guest">⭐ แขกรับเชิญ (Guest)</option>
                            <option value="cheer">💃 เชียร์ลีดเดอร์ (Cheerleader)</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                    <label class="text-sm font-bold text-slate-700 block mb-2">3. ผูกกับผู้ร่วมงาน (User ID / ชื่อ):</label>
                    <input type="text" id="assigned-user" placeholder="ระบุชื่อผู้ใช้งาน..." class="w-full border border-slate-300 p-3 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all shadow-sm">
                </div>

                <button id="save-seat-btn" class="w-full bg-indigo-600 text-white font-bold py-3.5 rounded-xl mt-4 hover:bg-indigo-700 active:transform active:scale-95 transition-all shadow-lg hover:shadow-indigo-500/30 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
                    บันทึกข้อมูล
                </button>
            </div>
        </div>
    </aside>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🛑🛑 ใส่ Config ของคุณตรงนี้ 🛑🛑
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mapContainer = document.getElementById('stadium-map');

        const topZoneNames = ['A', 'B', 'C', 'D', 'E'];
        const bottomZoneNames = ['F', 'G', 'H', 'STAGE', 'J', 'K', 'L'];
        const rowLetters = ['A', 'B', 'C', 'D', 'E', 'F']; 

        const topZonesLayout = [
            "**********|************|************|************|**********",
            "******--**|************|*****--*****|************|**--******",
            "******--**|************|*****--*****|************|**--******",
            "******--**|************|*****--*****|************|**--******",
            "******--**|************|*****--*****|************|**--******",
            "******--**|************|*****--*****|************|**--******"
        ];

        const bottomZonesLayout = [
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)",
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)",
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)",
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)",
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)",
            "(*******)*****|************|************|<STAGE>|************|************|*****(*******)"
        ];

        function renderStadiumSide(layoutArray, zoneNamesArray, isTopSide) {
            layoutArray.forEach((rowStr, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-4 justify-center mb-1 w-full';
                
                const rowLetter = isTopSide ? rowLetters[5 - index] : rowLetters[index];
                
                const rowLabelLeft = document.createElement('div');
                rowLabelLeft.className = 'w-8 flex items-center justify-center font-black text-slate-400 text-sm';
                rowLabelLeft.innerText = rowLetter;
                rowDiv.appendChild(rowLabelLeft);

                const zones = rowStr.split('|');

                zones.forEach((zoneStr, zIdx) => {
                    const zoneName = zoneNamesArray[zIdx];
                    const zoneContainer = document.createElement('div');
                    zoneContainer.className = 'seat-container group';
                    
                    const zoneBadge = document.createElement('div');
                    zoneBadge.className = 'absolute -top-7 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white text-[10px] px-2.5 py-1 rounded shadow-lg hidden group-hover:block whitespace-nowrap z-50';
                    zoneBadge.innerText = `Zone ${zoneName}`;
                    
                    // ป้องกันการแหว่งของ Tooltip แบบสามเหลี่ยม
                    const triangle = document.createElement('div');
                    triangle.className = 'absolute top-full left-1/2 transform -translate-x-1/2 border-[4px] border-transparent border-t-slate-800';
                    zoneBadge.appendChild(triangle);
                    zoneContainer.appendChild(zoneBadge);

                    let seatNum = 1;
                    let isBlind = false;

                    if (zoneStr === '<STAGE>') {
                        const stageDiv = document.createElement('div');
                        stageDiv.className = `stage-zone ${index === 0 ? 'stage-row-first' : ''} ${index === 5 ? 'stage-row-last' : ''}`;
                        if (index === 2) stageDiv.innerHTML = "<span class='tracking-[0.5em] text-xl'>STAGE</span>";
                        zoneContainer.appendChild(stageDiv);
                        rowDiv.appendChild(zoneContainer);
                        return; 
                    }

                    for (let i = 0; i < zoneStr.length; i++) {
                        const char = zoneStr[i];

                        if (char === '(') { isBlind = true; continue; }
                        if (char === ')') { isBlind = false; continue; }
                        
                        if (char === '-') {
                            const stair = document.createElement('div');
                            stair.className = 'stair';
                            zoneContainer.appendChild(stair);
                        } else if (char === '*') {
                            const seatNumStr = seatNum.toString().padStart(2, '0');
                            const seatId = `${zoneName}-${rowLetter}${seatNumStr}`;
                            
                            const seat = document.createElement('div');
                            seat.id = seatId;
                            seat.title = seatId; 
                            seat.innerText = seatNumStr; 
                            
                            seat.className = `seat ${isBlind ? 'blocked' : 'available'}`;
                            seat.onclick = () => selectSeat(seatId);
                            zoneContainer.appendChild(seat);
                            seatNum++;
                        }
                    }
                    rowDiv.appendChild(zoneContainer);
                });

                const rowLabelRight = document.createElement('div');
                rowLabelRight.className = 'w-8 flex items-center justify-center font-black text-slate-400 text-sm';
                rowLabelRight.innerText = rowLetter;
                rowDiv.appendChild(rowLabelRight);

                mapContainer.appendChild(rowDiv);
            });
        }

        renderStadiumSide(topZonesLayout, topZoneNames, true);

        // สนามบาสเกตบอลฉบับสวยสมจริง
        const court = document.createElement('div');
        court.className = 'w-[840px] aspect-[28/15] bg-[#df9753] border-[6px] border-white ring-4 ring-[#ce7a32] rounded-sm flex flex-col justify-center items-center my-10 relative shadow-xl overflow-hidden flex-shrink-0';
        court.innerHTML = `
            <div class="absolute inset-0 flex justify-center"><div class="w-[4px] h-full bg-white opacity-80"></div></div>
            <div class="absolute w-36 h-36 border-[4px] border-white opacity-80 rounded-full flex items-center justify-center"></div>
            <span class="z-10 font-black text-[#8b4513] text-2xl tracking-[0.5em] uppercase bg-white/80 px-8 py-3 rounded-lg shadow-sm backdrop-blur-sm border border-white/50">Basketball Court</span>
        `;
        mapContainer.appendChild(court);

        renderStadiumSide(bottomZonesLayout, bottomZoneNames, false);

        let currentSelectedSeat = null;
        
        function selectSeat(seatId) {
            currentSelectedSeat = seatId;
            document.getElementById('selected-seat-id').innerText = seatId;
            document.getElementById('seat-controls').classList.remove('hidden');
            
            const seatEl = document.getElementById(seatId);
            const statusSelect = document.getElementById('seat-status');
            
            if(seatEl.classList.contains('blocked')) statusSelect.value = 'blocked';
            else if(seatEl.classList.contains('red')) statusSelect.value = 'red';
            else if(seatEl.classList.contains('purple')) statusSelect.value = 'purple';
            else if(seatEl.classList.contains('blue')) statusSelect.value = 'blue';
            else if(seatEl.classList.contains('green')) statusSelect.value = 'green';
            else if(seatEl.classList.contains('guest')) statusSelect.value = 'guest';
            else if(seatEl.classList.contains('cheer')) statusSelect.value = 'cheer';
            else statusSelect.value = 'available';

            document.getElementById('assigned-user').value = "";
        }

        document.getElementById('save-seat-btn').addEventListener('click', async () => {
            if(!currentSelectedSeat) return;
            const btn = document.getElementById('save-seat-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = 'กำลังบันทึก...';
            btn.disabled = true;
            btn.classList.add('opacity-75');

            const status = document.getElementById('seat-status').value;
            const assignedUser = document.getElementById('assigned-user').value;

            try {
                await setDoc(doc(db, "seats", currentSelectedSeat), {
                    status: status,
                    assigned_to: assignedUser,
                    updated_at: new Date()
                });
                const seatEl = document.getElementById(currentSelectedSeat);
                seatEl.style.boxShadow = "0 0 0 4px rgba(79, 70, 229, 0.4)";
                setTimeout(() => { seatEl.style.boxShadow = ""; }, 1000);
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาดในการบันทึก");
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                btn.classList.remove('opacity-75');
            }
        });

        onSnapshot(collection(db, "seats"), (snapshot) => {
            snapshot.forEach((doc) => {
                const seatData = doc.data();
                const seatEl = document.getElementById(doc.id);
                if(seatEl) {
                    seatEl.className = 'seat';
                    if(seatData.status) {
                        seatEl.classList.add(seatData.status);
                    } else {
                        seatEl.classList.add('available');
                    }
                }
            });
        });

        window.selectSeat = selectSeat;
    </script>
</body>
</html>
