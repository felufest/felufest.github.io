<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดผังที่นั่ง FeluFest #1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .seat {
            width: 22px;
            height: 22px;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
            font-size: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: transparent;
        }
        .seat:hover:not(.stair):not(.stage) { transform: scale(1.2); box-shadow: 0 0 5px rgba(0,0,0,0.3); color: white; z-index: 10; }
        
        .seat.available { background-color: #f1f5f9; }
        .seat.blocked { background-color: #64748b; border-color: #475569; color: white; } /* () มุมอับ */
        .seat.stage { background-color: #fbbf24; border: none; cursor: default; } /* <> เวที */
        .seat.stair { background-color: transparent; border: none; cursor: default; } /* -- บันได */
        
        .seat.red { background-color: #ef4444; border-color: #b91c1c; color: white;}
        .seat.purple { background-color: #a855f7; border-color: #7e22ce; color: white;}
        .seat.blue { background-color: #3b82f6; border-color: #1d4ed8; color: white;}
        .seat.green { background-color: #22c55e; border-color: #15803d; color: white;}
    </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans flex">

    <div class="flex-1 p-8 overflow-auto">
        <div class="bg-white p-6 rounded-xl shadow-lg inline-block min-w-full min-h-full">
            <h1 class="text-2xl font-bold mb-4 text-gray-800 text-center">ผังที่นั่ง FeluFest #1</h1>
            
            <div class="mb-6 text-center text-sm flex justify-center gap-4 flex-wrap">
                <span class="flex items-center"><div class="w-4 h-4 bg-gray-100 border mr-1"></div> ว่าง</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-slate-500 mr-1"></div> สตาฟฟ์/มุมอับ</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-yellow-400 mr-1"></div> เวที</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-red-500 mr-1"></div> แดง</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-purple-500 mr-1"></div> ม่วง</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-blue-500 mr-1"></div> น้ำเงิน</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-green-500 mr-1"></div> เขียว</span>
            </div>

            <div id="stadium-map" class="flex flex-col items-center bg-gray-50 p-6 rounded-lg border-2 border-dashed border-gray-300 gap-1">
                </div>
        </div>
    </div>

    <div class="w-80 bg-white shadow-2xl p-6 flex flex-col border-l border-gray-300 z-10 fixed right-0 top-0 h-full overflow-y-auto">
        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b pb-2">จัดการที่นั่ง</h2>
        
        <div id="seat-info" class="mb-6">
            <div class="bg-gray-100 p-4 rounded-lg text-center border">
                <span class="text-xs text-gray-500 block mb-1">รหัสที่นั่งที่เลือก</span>
                <span id="selected-seat-id" class="text-xl font-bold text-blue-600">-</span>
            </div>
        </div>

        <div id="seat-controls" class="hidden flex-col gap-3">
            <label class="text-sm font-bold text-gray-700">สถานะ / สีทีม:</label>
            <select id="seat-status" class="border p-2 rounded w-full bg-white">
                <option value="available">ว่าง (Available)</option>
                <option value="blocked">สตาฟฟ์ / มุมอับ (Blocked)</option>
                <option value="red">ทีมสีแดง</option>
                <option value="purple">ทีมสีม่วง</option>
                <option value="blue">ทีมสีน้ำเงิน</option>
                <option value="green">ทีมสีเขียว</option>
            </select>

            <label class="text-sm font-bold text-gray-700 mt-2">ระบุชื่อ / ID ผู้ใช้งาน:</label>
            <input type="text" id="assigned-user" placeholder="ใส่ชื่อหรือโน้ต (เช่น หลีด/VIP)..." class="border p-2 rounded w-full">

            <button id="save-seat-btn" class="bg-blue-600 text-white font-bold py-3 rounded mt-4 hover:bg-blue-700 transition">
                บันทึกที่นั่งนี้
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🛑🛑 วาง firebaseConfig ตรงนี้ 🛑🛑
        const firebaseConfig = {
            apiKey: "ใส่ของคุณ",
            authDomain: "ใส่ของคุณ",
            projectId: "ใส่ของคุณ",
            storageBucket: "ใส่ของคุณ",
            messagingSenderId: "ใส่ของคุณ",
            appId: "ใส่ของคุณ"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const mapContainer = document.getElementById('stadium-map');

        // สัญลักษณ์: * = ว่าง, - = บันได, b = มุมอับ/สตาฟฟ์ (), x = เวที <>, | = แบ่งโซน (อัฒจันทร์)
        const topZoneLayout = [
            "**********|************|************|************|**********", // r6
            "******--**|************|*****--*****|************|**--******", // r5
            "******--**|************|*****--*****|************|**--******", // r4
            "******--**|************|*****--*****|************|**--******", // r3
            "******--**|************|*****--*****|************|**--******", // r2
            "******--**|************|*****--*****|************|**--******"  // r1
        ];

        const bottomZoneLayout = [
            "bbbbbbb*--**|************|******--****|xxxxxxxxxxxx|****--******|************|**--*bbbbbbb", // r1
            "bbbbbbb*--**|************|******--****|xxxxxxxxxxxx|****--******|************|**--*bbbbbbb", // r2
            "bbbbbbb*--**|************|******--****|xxxxxxxxxxxx|****--******|************|**--*bbbbbbb", // r3
            "bbbbbbb*--**|************|******--****|xxxxxxxxxxxx|****--******|************|**--*bbbbbbb", // r4
            "bbbbbbb*--**|************|******--****|xxxxxxxxxxxx|****--******|************|**--*bbbbbbb", // r5
            "bbbbbbb*****|************|************|xxxxxxxxxxxx|****--******|************|**--*bbbbbbb"  // r6
        ];

        function renderZone(layoutArray, prefix, reverseRow) {
            layoutArray.forEach((rowPattern, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-1 justify-center';
                
                // คำนวณเลขแถว (โซนบน r6 ลงมา r1, โซนล่าง r1 ลงไป r6)
                const rowNumber = reverseRow ? (6 - rowIndex) : (rowIndex + 1); 

                for(let i = 0; i < rowPattern.length; i++) {
                    const char = rowPattern[i];
                    
                    if (char === '|') {
                        // เส้นแบ่งโซน (ขยายช่องว่าง)
                        const gap = document.createElement('div');
                        gap.className = 'w-3'; 
                        rowDiv.appendChild(gap);
                        continue;
                    }

                    const seatDiv = document.createElement('div');
                    const seatId = `${prefix}-r${rowNumber}-c${i+1}`;
                    seatDiv.id = seatId;
                    
                    if (char === '*') {
                        seatDiv.className = 'seat available';
                        seatDiv.innerText = `R${rowNumber}`;
                        seatDiv.onclick = () => selectSeat(seatId);
                    } else if (char === '-') {
                        seatDiv.className = 'seat stair';
                    } else if (char === 'b') {
                        seatDiv.className = 'seat blocked';
                        seatDiv.innerText = 'b';
                        seatDiv.onclick = () => selectSeat(seatId);
                    } else if (char === 'x') {
                        seatDiv.className = 'seat stage';
                    }
                    
                    rowDiv.appendChild(seatDiv);
                }
                mapContainer.appendChild(rowDiv);
            });
        }

        // 1. สร้างโซนบน
        const topLabel = document.createElement('div');
        topLabel.className = 'font-bold text-gray-500 mt-2 mb-1';
        topLabel.innerText = "โซนด้านบน";
        mapContainer.appendChild(topLabel);
        renderZone(topZoneLayout, 'top', true); // เรียง r6 -> r1

        // 2. สร้างสนาม
        const field = document.createElement('div');
        field.className = 'w-11/12 h-32 bg-green-100 border-2 border-green-500 rounded-lg my-6 flex flex-col items-center justify-center text-green-700 font-bold tracking-widest relative';
        field.innerHTML = `
            <span class="text-xl">ส น า ม กี ฬ า</span>
            <div class="absolute w-1 h-full bg-green-500"></div> <div class="absolute w-32 h-16 border-2 border-green-500 rounded-lg"></div> `;
        mapContainer.appendChild(field);

        // 3. สร้างโซนล่าง
        const bottomLabel = document.createElement('div');
        bottomLabel.className = 'font-bold text-gray-500 mb-1';
        bottomLabel.innerText = "โซนด้านล่าง (มีเวทีกลาง)";
        mapContainer.appendChild(bottomLabel);
        renderZone(bottomZoneLayout, 'bot', false); // เรียง r1 -> r6

        // --- ระบบคลิกและจัดการข้อมูล ---
        let currentSelectedSeat = null;
        
        function selectSeat(seatId) {
            currentSelectedSeat = seatId;
            document.getElementById('selected-seat-id').innerText = seatId;
            document.getElementById('seat-controls').classList.remove('hidden');
            
            const seatEl = document.getElementById(seatId);
            const statusSelect = document.getElementById('seat-status');
            
            if(seatEl.classList.contains('blocked')) statusSelect.value = 'blocked';
            else if(seatEl.classList.contains('red')) statusSelect.value = 'red';
            else if(seatEl.classList.contains('purple')) statusSelect.value = 'purple';
            else if(seatEl.classList.contains('blue')) statusSelect.value = 'blue';
            else if(seatEl.classList.contains('green')) statusSelect.value = 'green';
            else statusSelect.value = 'available';
        }

        document.getElementById('save-seat-btn').addEventListener('click', async () => {
            if(!currentSelectedSeat) return;
            
            const status = document.getElementById('seat-status').value;
            const assignedUser = document.getElementById('assigned-user').value;

            try {
                await setDoc(doc(db, "seats", currentSelectedSeat), {
                    status: status,
                    assigned_to: assignedUser,
                    updated_at: new Date()
                });
                alert("อัปเดตที่นั่งเรียบร้อย!");
            } catch (error) {
                alert("เกิดข้อผิดพลาดในการบันทึก");
            }
        });

        onSnapshot(collection(db, "seats"), (snapshot) => {
            snapshot.forEach((doc) => {
                const seatData = doc.data();
                const seatEl = document.getElementById(doc.id);
                
                if(seatEl) {
                    seatEl.className = 'seat';
                    // คงสภาพให้มุมอับ (b) และที่นั่งธรรมดา
                    if (seatEl.innerText === 'b' && (!seatData.status || seatData.status === 'available')) {
                         seatEl.classList.add('blocked');
                    } else if(seatData.status) {
                        seatEl.classList.add(seatData.status);
                    } else {
                        seatEl.classList.add('available');
                    }
                }
            });
        });

        window.selectSeat = selectSeat;
    </script>
</body>
</html>
