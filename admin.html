<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - จัดผังที่นั่ง FeluFest #1 (Interactive Map)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* กำหนดขนาดมาตรฐานให้เก้าอี้และบันไดเท่ากันเป๊ะ เพื่อไม่ให้ผังแหว่ง */
        :root {
            --cell-size: 24px;
            --cell-gap: 4px;
        }

        .seat-container {
            display: flex;
            gap: var(--cell-gap);
            position: relative;
        }

        /* สไตล์พื้นฐานของเก้าอี้ */
        .seat {
            width: var(--cell-size);
            height: var(--cell-size);
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #cbd5e1;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: transparent;
            box-sizing: border-box;
        }
        .seat:hover {
            transform: scale(1.2);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            color: #334155;
            z-index: 10;
        }
        
        /* สไตล์ทางเดิน (ขนาดเท่าเก้าอี้เป๊ะ) */
        .stair { 
            width: var(--cell-size); 
            height: var(--cell-size); 
            background: repeating-linear-gradient(45deg, transparent, transparent 4px, rgba(0,0,0,0.03) 4px, rgba(0,0,0,0.03) 8px); 
            border: 1px dashed #e2e8f0;
            box-sizing: border-box;
        }
        
        /* สไตล์โซนเวที (ก้อนเดียว) */
        .stage-zone {
            background: #1e293b;
            color: white;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ความกว้าง = เก้าอี้ 12 ตัว + ช่องว่าง 11 ช่อง */
            width: calc((var(--cell-size) * 12) + (var(--cell-gap) * 11)); 
            height: 100%;
            border-left: 1px solid #334155;
            border-right: 1px solid #334155;
        }
        /* ลบขอบมนและเส้นขอบบน-ล่างออก เพื่อให้เวลาซ้อนกัน 6 แถวดูเป็นเนื้อเดียวกัน */
        .stage-row-first { border-radius: 8px 8px 0 0; border-top: 1px solid #334155; }
        .stage-row-last { border-radius: 0 0 8px 8px; border-bottom: 1px solid #334155; }

        /* สถานะต่างๆ ของเก้าอี้ */
        .seat.available { background-color: #f1f5f9; }
        .seat.blocked { background-color: #475569; border-color: #334155; cursor: not-allowed; }
        .seat.blocked:hover { color: white; }
        
        /* สีทีมและบทบาท */
        .seat.red { background-color: #ef4444; border-color: #b91c1c; color: white;}
        .seat.purple { background-color: #a855f7; border-color: #7e22ce; color: white;}
        .seat.blue { background-color: #3b82f6; border-color: #1d4ed8; color: white;}
        .seat.green { background-color: #22c55e; border-color: #15803d; color: white;}
        .seat.guest { background-color: #f59e0b; border-color: #b45309; color: white; border-radius: 50%; }
        .seat.cheer { background-color: #ec4899; border-color: #be185d; color: white; }
        
        .map-wrapper { min-width: max-content; }
    </style>
</head>
<body class="bg-gray-200 min-h-screen font-sans flex h-screen overflow-hidden">

    <div class="flex-1 p-6 overflow-auto bg-gray-200 relative shadow-inner flex justify-center">
        
        <div class="bg-white p-8 rounded-xl shadow-lg inline-block map-wrapper mb-20 h-max">
            <h1 class="text-3xl font-bold mb-2 text-gray-800 text-center tracking-wide">FeluFest #1 Seating Map</h1>
            <p class="text-center text-gray-500 mb-6 text-sm">โซนบน (A-E) และ โซนล่าง (F-L)</p>
            
            <div class="mb-8 flex flex-wrap justify-center gap-4 bg-gray-50 p-4 rounded-lg border border-gray-200 text-sm">
                <span class="flex items-center"><div class="w-4 h-4 bg-gray-100 border mr-2"></div> ว่าง</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-slate-600 mr-2"></div> บล็อก</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-red-500 mr-2 rounded-sm"></div> แดง</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-purple-500 mr-2 rounded-sm"></div> ม่วง</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-blue-500 mr-2 rounded-sm"></div> น้ำเงิน</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-green-500 mr-2 rounded-sm"></div> เขียว</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-amber-500 rounded-full mr-2"></div> แขกรับเชิญ</span>
                <span class="flex items-center"><div class="w-4 h-4 bg-pink-500 mr-2"></div> เชียร์ลีดเดอร์</span>
            </div>

            <div id="stadium-map" class="flex flex-col gap-1 items-center bg-gray-100 p-8 rounded-2xl border border-gray-300 w-max mx-auto">
                </div>
        </div>
    </div>

    <div class="w-80 bg-white shadow-2xl p-6 flex flex-col border-l border-gray-300 z-20 overflow-y-auto">
        <h2 class="text-xl font-bold text-gray-800 mb-4 border-b-2 border-blue-500 pb-2">จัดการที่นั่ง</h2>
        
        <div id="seat-info" class="mb-6">
            <p class="text-gray-500 text-sm mb-2">1. คลิกที่เก้าอี้บนผังเพื่อแก้ไข</p>
            <div class="bg-blue-50 p-4 rounded-lg text-center border border-blue-200 shadow-inner">
                <span class="text-xs text-blue-600 font-bold block uppercase tracking-wider">รหัสที่นั่ง (Seat ID)</span>
                <span id="selected-seat-id" class="text-3xl font-black text-blue-800">-</span>
            </div>
        </div>

        <div id="seat-controls" class="hidden flex-col gap-4">
            <div>
                <label class="text-sm font-bold text-gray-700 block mb-1">2. กำหนดสถานะ / สีทีม:</label>
                <select id="seat-status" class="border-2 border-gray-300 p-2 rounded-lg w-full bg-white focus:border-blue-500 outline-none">
                    <option value="available">⚪ ว่าง (Available)</option>
                    <option value="blocked">⚫ บล็อก / สตาฟฟ์ (Blocked)</option>
                    <hr>
                    <option value="red">🔴 ผู้ชม: ทีมสีแดง</option>
                    <option value="purple">🟣 ผู้ชม: ทีมสีม่วง</option>
                    <option value="blue">🔵 ผู้ชม: ทีมสีน้ำเงิน</option>
                    <option value="green">🟢 ผู้ชม: ทีมสีเขียว</option>
                    <hr>
                    <option value="guest">⭐ แขกรับเชิญ (Guest)</option>
                    <option value="cheer">💃 เชียร์ลีดเดอร์ (Cheerleader)</option>
                </select>
            </div>

            <div>
                <label class="text-sm font-bold text-gray-700 block mb-1">3. ผูกกับผู้ร่วมงาน (ค้นหาชื่อ):</label>
                <input type="text" id="assigned-user" placeholder="ใส่ชื่อ..." class="border-2 border-gray-300 p-2 rounded-lg w-full focus:border-blue-500 outline-none">
            </div>

            <button id="save-seat-btn" class="bg-blue-600 text-white font-bold py-3 rounded-lg mt-2 hover:bg-blue-700 transition shadow-md flex items-center justify-center gap-2">
                บันทึกข้อมูล
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 🛑🛑 ใส่ Config ของคุณ 🛑🛑
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mapContainer = document.getElementById('stadium-map');

        const topZoneNames = ['A', 'B', 'C', 'D', 'E'];
        const bottomZoneNames = ['F', 'G', 'H', 'STAGE', 'J', 'K', 'L'];
        const rowLetters = ['A', 'B', 'C', 'D', 'E', 'F']; 

        const topZonesLayout = [
            "**********|************|************|************|**********", // F
            "******--**|************|*****--*****|************|**--******", // E
            "******--**|************|*****--*****|************|**--******", // D
            "******--**|************|*****--*****|************|**--******", // C
            "******--**|************|*****--*****|************|**--******", // B
            "******--**|************|*****--*****|************|**--******"  // A
        ];

        const bottomZonesLayout = [
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)", // A
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)", // B
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)", // C
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)", // D
            "(*******)*--**|************|******--****|<STAGE>|****--******|************|**--*(*******)", // E
            "(*******)*****|************|************|<STAGE>|************|************|*****(*******)"  // F
        ];

        function renderStadiumSide(layoutArray, zoneNamesArray, isTopSide) {
            layoutArray.forEach((rowStr, index) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'flex gap-4 justify-center mb-1 w-full';
                
                const rowLetter = isTopSide ? rowLetters[5 - index] : rowLetters[index];
                
                const rowLabelLeft = document.createElement('div');
                rowLabelLeft.className = 'w-6 flex items-center justify-center font-bold text-gray-400 text-xs';
                rowLabelLeft.innerText = rowLetter;
                rowDiv.appendChild(rowLabelLeft);

                const zones = rowStr.split('|');

                zones.forEach((zoneStr, zIdx) => {
                    const zoneName = zoneNamesArray[zIdx];
                    const zoneContainer = document.createElement('div');
                    zoneContainer.className = 'seat-container group';
                    
                    const zoneBadge = document.createElement('div');
                    zoneBadge.className = 'absolute -top-6 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white text-[10px] px-2 py-1 rounded hidden group-hover:block whitespace-nowrap z-50';
                    zoneBadge.innerText = `Zone ${zoneName}`;
                    zoneContainer.appendChild(zoneBadge);

                    let seatNum = 1;
                    let isBlind = false;

                    if (zoneStr === '<STAGE>') {
                        const stageDiv = document.createElement('div');
                        stageDiv.className = `stage-zone ${index === 0 ? 'stage-row-first' : ''} ${index === 5 ? 'stage-row-last' : ''}`;
                        if (index === 2) stageDiv.innerHTML = "<span class='tracking-[0.3em]'>STAGE</span>";
                        zoneContainer.appendChild(stageDiv);
                        rowDiv.appendChild(zoneContainer);
                        return; 
                    }

                    for (let i = 0; i < zoneStr.length; i++) {
                        const char = zoneStr[i];

                        if (char === '(') { isBlind = true; continue; }
                        if (char === ')') { isBlind = false; continue; }
                        
                        if (char === '-') {
                            const stair = document.createElement('div');
                            stair.className = 'stair';
                            zoneContainer.appendChild(stair);
                        } else if (char === '*') {
                            const seatNumStr = seatNum.toString().padStart(2, '0');
                            const seatId = `${zoneName}-${rowLetter}${seatNumStr}`;
                            
                            const seat = document.createElement('div');
                            seat.id = seatId;
                            seat.title = seatId; 
                            seat.innerText = seatNumStr; 
                            
                            seat.className = `seat ${isBlind ? 'blocked' : 'available'}`;
                            seat.onclick = () => selectSeat(seatId);
                            zoneContainer.appendChild(seat);
                            seatNum++;
                        }
                    }
                    rowDiv.appendChild(zoneContainer);
                });

                const rowLabelRight = document.createElement('div');
                rowLabelRight.className = 'w-6 flex items-center justify-center font-bold text-gray-400 text-xs';
                rowLabelRight.innerText = rowLetter;
                rowDiv.appendChild(rowLabelRight);

                mapContainer.appendChild(rowDiv);
            });
        }

        renderStadiumSide(topZonesLayout, topZoneNames, true);

        // ปรับขนาดสนามบาสให้สมจริง (สัดส่วนประมาณ 2:1)
        const court = document.createElement('div');
        court.className = 'w-[800px] aspect-[27/15] bg-orange-100 border-4 border-orange-400 rounded-lg flex flex-col justify-center items-center my-8 relative shadow-inner overflow-hidden flex-shrink-0';
        court.innerHTML = `
            <div class="absolute inset-0 flex justify-center"><div class="w-1 h-full bg-orange-400"></div></div>
            <div class="absolute w-32 h-32 border-4 border-orange-400 rounded-full flex items-center justify-center"></div>
            <span class="z-10 font-black text-orange-800 text-2xl tracking-[0.5em] opacity-40 uppercase bg-white/70 px-6 py-2 rounded">Basketball Court</span>
        `;
        mapContainer.appendChild(court);

        renderStadiumSide(bottomZonesLayout, bottomZoneNames, false);

        let currentSelectedSeat = null;
        
        function selectSeat(seatId) {
            currentSelectedSeat = seatId;
            document.getElementById('selected-seat-id').innerText = seatId;
            document.getElementById('seat-controls').classList.remove('hidden');
            
            const seatEl = document.getElementById(seatId);
            const statusSelect = document.getElementById('seat-status');
            
            if(seatEl.classList.contains('blocked')) statusSelect.value = 'blocked';
            else if(seatEl.classList.contains('red')) statusSelect.value = 'red';
            else if(seatEl.classList.contains('purple')) statusSelect.value = 'purple';
            else if(seatEl.classList.contains('blue')) statusSelect.value = 'blue';
            else if(seatEl.classList.contains('green')) statusSelect.value = 'green';
            else if(seatEl.classList.contains('guest')) statusSelect.value = 'guest';
            else if(seatEl.classList.contains('cheer')) statusSelect.value = 'cheer';
            else statusSelect.value = 'available';

            document.getElementById('assigned-user').value = "";
        }

        document.getElementById('save-seat-btn').addEventListener('click', async () => {
            if(!currentSelectedSeat) return;
            const btn = document.getElementById('save-seat-btn');
            btn.innerHTML = 'กำลังบันทึก...';

            const status = document.getElementById('seat-status').value;
            const assignedUser = document.getElementById('assigned-user').value;

            try {
                await setDoc(doc(db, "seats", currentSelectedSeat), {
                    status: status,
                    assigned_to: assignedUser,
                    updated_at: new Date()
                });
                const seatEl = document.getElementById(currentSelectedSeat);
                seatEl.style.boxShadow = "0 0 15px 5px rgba(34, 197, 94, 0.8)";
                setTimeout(() => { seatEl.style.boxShadow = ""; }, 1000);
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาดในการบันทึก");
            } finally {
                btn.innerHTML = 'บันทึกข้อมูล';
            }
        });

        onSnapshot(collection(db, "seats"), (snapshot) => {
            snapshot.forEach((doc) => {
                const seatData = doc.data();
                const seatEl = document.getElementById(doc.id);
                if(seatEl) {
                    seatEl.className = 'seat';
                    if(seatData.status) {
                        seatEl.classList.add(seatData.status);
                    } else {
                        seatEl.classList.add('available');
                    }
                    if (seatEl.innerText === "" && seatData.status !== "available") {}
                }
            });
        });

        window.selectSeat = selectSeat;
    </script>
</body>
</html>
